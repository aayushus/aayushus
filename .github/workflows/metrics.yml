name: GitHub Metrics
on:
  # Regenerate daily so stats stay current
  schedule:
    - cron: "0 6 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate whenever the workflow itself changes
  push:
    branches: [main]
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # GITHUB_TOKEN works out of the box for public profile data.
          # For richer stats (private contributions, followers), create a
          # classic PAT with `repo` + `read:user` scopes, add it as a repo
          # secret named METRICS_TOKEN, and swap the line below to:
          #   token: ${{ secrets.METRICS_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.svg
          template: classic
          config_timezone: America/New_York

          # Core stats: activity, community, repositories
          base: header, activity, community, repositories, metadata

          # Language breakdown — replaces the donut card
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github

          # Lines of code changed
          plugin_lines: yes
