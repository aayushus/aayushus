name: GitHub Metrics
on:
  # Refresh daily so stats stay current
  schedule:
    - cron: "0 6 * * *"
  # Run on demand from the Actions tab (use this after adding METRICS_TOKEN)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Personal Access Token (classic) with `repo` + `read:user` scopes,
          # stored as a repo secret named METRICS_TOKEN. This unlocks language
          # data and full contribution history that GITHUB_TOKEN cannot read.
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg
          template: classic
          config_timezone: America/New_York

          # Curated sections — activity + repositories only.
          # (Community stats omitted; they surface 0-org / 0-sponsor noise.)
          base: header, activity, repositories

          # Live language breakdown
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github

          # Lines of code changed
          plugin_lines: yes
