name: GitHub Metrics
on:
  # Refresh weekly (Mondays, off-peak UTC / odd minute to avoid the top-of-hour queue)
  schedule:
    - cron: "17 9 * * 1"
  # Run on demand from the Actions tab (use this after adding METRICS_TOKEN)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # Card 1 — most-used languages
      - name: Languages card
        uses: lowlighter/metrics@latest
        with:
          # Personal Access Token (classic) with `repo` + `read:user` scopes,
          # stored as a repo secret named METRICS_TOKEN. This unlocks language
          # data and full contribution history that GITHUB_TOKEN cannot read.
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg
          template: classic
          config_timezone: America/New_York
          # No base sections, so none of the zero-value rows appear.
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github

      # Card 2 — coding activity (when/how I commit)
      - name: Habits card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-habits.svg
          template: classic
          config_timezone: America/New_York
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 7
          plugin_habits_facts: yes
          plugin_habits_charts: yes
