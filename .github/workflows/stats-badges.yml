name: Update Stat Badges
on:
  # Refresh weekly (Mondays), staggered after the metrics workflow to avoid push races
  schedule:
    - cron: "42 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute live stats and update README badges
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, re, json, urllib.request
          from datetime import datetime, timezone

          tok = os.environ["GH_TOKEN"]
          user = "aayushus"

          def rest(url):
              req = urllib.request.Request(
                  url, headers={"Authorization": f"token {tok}",
                                "Accept": "application/vnd.github+json"})
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          def graphql(query, variables):
              body = json.dumps({"query": query, "variables": variables}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/graphql", data=body,
                  headers={"Authorization": f"bearer {tok}",
                           "Content-Type": "application/json"})
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          def floor_to(n, step):
              return (n // step) * step

          readme = open("README.md").read()

          # Public repositories — exact; also grab the join year
          start_year = 2011
          try:
              info = rest(f"https://api.github.com/users/{user}")
              repos = info["public_repos"]
              start_year = int(info["created_at"][:4])
              readme = re.sub(r"(badge/Public%20Repos-)[^-]+(-)",
                              lambda m: f"{m.group(1)}{repos}{m.group(2)}", readme)
              print("repos:", repos, "| joined:", start_year)
          except Exception as e:
              print("repos skipped:", e)

          # Commits + PRs via contributionsCollection, summed across every year
          # since joining (matches GitHub's own contribution graph, incl. private).
          Q = """query($from:DateTime!,$to:DateTime!){
            viewer{ contributionsCollection(from:$from,to:$to){
              totalCommitContributions
              totalPullRequestContributions
            }}
          }"""
          now = datetime.now(timezone.utc)
          commits = prs = 0
          try:
              for y in range(start_year, now.year + 1):
                  frm = f"{y}-01-01T00:00:00Z"
                  to = (now.strftime("%Y-%m-%dT%H:%M:%SZ")
                        if y == now.year else f"{y}-12-31T23:59:59Z")
                  cc = graphql(Q, {"from": frm, "to": to})["data"]["viewer"]["contributionsCollection"]
                  commits += cc["totalCommitContributions"]
                  prs += cc["totalPullRequestContributions"]
              cval = f"{floor_to(commits, 10)}%2B"
              pval = f"{floor_to(prs, 5)}%2B"
              readme = re.sub(r"(badge/Commits-)[^-]+(-)",
                              lambda m: f"{m.group(1)}{cval}{m.group(2)}", readme)
              readme = re.sub(r"(badge/Pull%20Requests-)[^-]+(-)",
                              lambda m: f"{m.group(1)}{pval}{m.group(2)}", readme)
              print("commits:", commits, "->", cval, "| prs:", prs, "->", pval)
          except Exception as e:
              print("contributions skipped:", e)

          open("README.md", "w").write(readme)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No badge changes."
          else
            git commit -m "Update stat badges [skip ci]"
            git pull --rebase origin main
            git push
          fi
