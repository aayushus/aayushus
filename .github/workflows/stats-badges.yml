name: Update Stat Badges
on:
  # Refresh daily, staggered after the metrics workflow to avoid push races
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute live stats and update README badges
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, re, json, urllib.request

          tok = os.environ["GH_TOKEN"]
          user = "aayushus"

          def api(url, accept="application/vnd.github+json"):
              req = urllib.request.Request(
                  url, headers={"Authorization": f"token {tok}", "Accept": accept}
              )
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          def floor_to(n, step):
              return (n // step) * step

          readme = open("README.md").read()

          # Public repositories — exact
          try:
              repos = api(f"https://api.github.com/users/{user}")["public_repos"]
              readme = re.sub(r"(badge/Public%20Repos-)[^-]+(-)",
                              lambda m: f"{m.group(1)}{repos}{m.group(2)}", readme)
              print("repos:", repos)
          except Exception as e:
              print("repos skipped:", e)

          # Commits authored — rounded down to nearest 10, shown as "N+"
          try:
              commits = api(f"https://api.github.com/search/commits?q=author:{user}&per_page=1",
                            accept="application/vnd.github.cloak-preview+json")["total_count"]
              val = f"{floor_to(commits, 10)}%2B"
              readme = re.sub(r"(badge/Commits-)[^-]+(-)",
                              lambda m: f"{m.group(1)}{val}{m.group(2)}", readme)
              print("commits:", commits, "->", val)
          except Exception as e:
              print("commits skipped:", e)

          # Pull requests opened — rounded down to nearest 5, shown as "N+"
          try:
              prs = api(f"https://api.github.com/search/issues?q=author:{user}+type:pr&per_page=1")["total_count"]
              val = f"{floor_to(prs, 5)}%2B"
              readme = re.sub(r"(badge/Pull%20Requests-)[^-]+(-)",
                              lambda m: f"{m.group(1)}{val}{m.group(2)}", readme)
              print("prs:", prs, "->", val)
          except Exception as e:
              print("prs skipped:", e)

          open("README.md", "w").write(readme)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No badge changes."
          else
            git commit -m "Update stat badges [skip ci]"
            git pull --rebase origin main
            git push
          fi
